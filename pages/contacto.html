<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contacto - A mordidas - Sandwicheria de especialidad</title>
        <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
        <script src="https://kit.fontawesome.com/53f4a08901.js" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="../css/estilos.css">
    </head>
    <body>
        <header class="simple_header">
           <section class="seccionNav">
                    <a class="imagenHeader" href="../index.html">
                    <img class="logo" src="../assets/img/mordidasBlanco.png" alt="Logo sandwicheria">
                    </a>
                    <nav class="navegacion">
                        <ul class="listaNav">
                            <li class="listaItem"><a class="linkNav" href="../index.html">Inicio</a></li>
                            <li class="listaItem"><a class="linkNav" href="./nuestro menu.html">Nuestro menu</a></li>
                            <li class="listaItem"><a class="linkNav" href="#">Contacto</a></li>
                        </ul>
                    </nav>
            </section>
        </header>
        <main>
            <section class="contacto">
                <h2 class="tituloFormularios">Trabajá con nosotros</h2>
                <form class="formulario">
                    <div class="campo">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" placeholder="Tu nombre" required>
                    </div>
                    <div class="campo">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="tuemail@gmail.com" required>
                    </div>
                    <div class="campo">
                        <label for="telefono">Teléfono</label>
                        <input type="tel" id="telefono" placeholder="Tu teléfono">
                    </div>
                    <div class="campo">
                        <label for="mensaje">Contanos sobre tu propuesta</label>
                        <textarea id="mensaje" rows="5" placeholder="Escribí tu mensaje..." required></textarea>
                    </div>
                    <button type="submit">Enviar mensaje</button>
                </form>
            </section>
            <section class="reseñas">
                <h2  class="tituloFormularios">Dejanos tu reseña</h2>
                <form class="formulario">
                    <div class="campo">
                        <label for="cliente">Nombre</label>
                        <input type="text" id="cliente" placeholder="Tu nombre" required>
                    </div>
                        <div class="campo">
                        <label for="producto">Producto que probaste</label>
                        <select id="producto">
                        <option>Brunchwich</option>
                        <option>Crudo</option>
                        <option>Capresse</option>
                        <option>Milandwich Carne</option>
                        <option>Milandwich Pollo</option>
                        <option>Classic</option>
                        <option>Elderretido</option>
                        </select>
                    </div>
                    <div class="campo">
                        <label for="rating">Calificación</label>
                        <select id="rating">
                        <option>⭐</option>
                        <option>⭐⭐</option>
                        <option>⭐⭐⭐</option>
                        <option>⭐⭐⭐⭐</option>
                        <option>⭐⭐⭐⭐⭐</option>
                        </select>
                    </div>
                    <div class="campo">
                        <label for="comentario">Tu opinión</label>
                        <textarea id="comentario" rows="4" placeholder="Contanos qué te pareció"></textarea>
                    </div>
                    <button type="submit">Enviar reseña</button>
                </form>
            </section>
        </main>
        <footer class="footer">
            <section class="seccionFooter">
                <nav class="navegacionFooter">
                    <H4 class="DondeIr">¿DONDE IR?</H4>
                    <ul class="listaNavFooter">
                        <li><a href="../pages/nuestro menu.html">Nuestro menu</a></li>
                        <li><a href="#">Contacto</a></li>
                    </ul>
                </nav>
                <section class="seccionFooterPedinos">
                    <h4 class="PedinosPor">PEDINOS POR</h4>
                    <a href="https://wa.link/ppp2t9" target="_blank"><i class="fab fa-whatsapp-square"></i></a>
                    <div>
                        <a class="iconoWhatsapp" href="https://wa.link/ppp2t9" target="_blank"><i class="fa-brands  fa-whatsapp"></i></a>
                        <p>WhatsApp</p>
                    </div>
                    <div>
                        <a href="https://www.pedidosya.com.ar/restaurantes/santa-fe/a-mordidas-10931aab-121b-469a-ae6a-1cef789a0ce0-menu" target="_blank">
                            <img src="../assets/img/pedidos-ya-seeklogo.png" alt="LogoPedidosYa" class="icon-pedidosya">
                        </a>
                        <p>Pedidos Ya</p>
                    </div>
                </section>
            </section>
            
            <div class="logoFooter">
                <a href="../index.html">
                    <img class="imgLogoFooter" src="../assets/img/mordidasBlanco.png" alt="Logo sandwicheria" loading="lazy">
                </a>
            </div>
            <section class="seccionFooterSeguinos">
                    <h4>SEGUINOS</h4>
                    <a href="https://www.instagram.com/amordidas.ca/" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                    <div class="paga">
                        <H4 class="tituloPaga">PAGA COMO QUIERAS</H4>
                        <p class="parrafoPaga">Tarjeta de debito, credito,<br>efectivo o Mercado Pago.</p>
                    </div>
            </section>
        </footer>
    </body>
</html>
